<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yusuf Durden | Hub</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #09090b;
      --surface:  #111113;
      --border:   rgba(255,255,255,0.07);
      --gold:     #c9a96e;
      --gold-dim: #8a6f45;
      --text:     #e8e4dc;
      --muted:    #6b6760;
      --ff-head:  'Cormorant Garamond', serif;
      --ff-mono:  'DM Mono', monospace;
      --ease:     cubic-bezier(0.16, 1, 0.3, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-mono);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Animated Grain Overlay ───────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 0;
      animation: grainShift 0.15s steps(1) infinite;
    }

    @keyframes grainShift {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(-2%,-1%); }
      50%  { transform: translate(1%,2%); }
      75%  { transform: translate(-1%,1%); }
      100% { transform: translate(2%,-2%); }
    }

    /* ── Radial Glow Background ───────────────────── */
    .bg-glow {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
      opacity: 0;
      animation: glowIn 1.8s var(--ease) forwards;
    }

    .bg-glow--1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(201,169,110,0.12), transparent 70%);
      top: -10%; left: 50%;
      transform: translateX(-50%);
      animation-delay: 0.3s;
    }

    .bg-glow--2 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(120,80,200,0.06), transparent 70%);
      bottom: 0; right: -5%;
    }

    @keyframes glowIn {
      to { opacity: 1; }
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: min(440px, calc(100vw - 2rem));
      padding: 2.8rem 2.4rem 2.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Avatar ───────────────────────────────────── */
    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ff-head);
      font-size: 2rem;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.05em;
      position: relative;
      margin-bottom: 1.4rem;
      opacity: 0;
      transform: scale(0.8);
      animation: avatarIn 0.9s var(--ease) 0.2s forwards;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.2);
      animation: ringPulse 3s ease-in-out infinite;
    }

    @keyframes avatarIn {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes ringPulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50%       { transform: scale(1.08); opacity: 0; }
    }

    /* ── Identity ─────────────────────────────────── */
    .identity {
      text-align: center;
      margin-bottom: 2.2rem;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.8s var(--ease) 0.5s forwards;
    }

    .identity__name {
      font-family: var(--ff-head);
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.45rem;
    }

    .identity__sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Divider ──────────────────────────────────── */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.8s forwards;
    }

    .divider__line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
      opacity: 0.4;
    }

    .divider__dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold-dim);
      opacity: 0.6;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── Links ────────────────────────────────────── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .link-item {
      opacity: 0;
      transform: translateY(14px);
    }

    .link-item:nth-child(1) { animation: fadeUp 0.6s var(--ease) 0.85s forwards; }
    .link-item:nth-child(2) { animation: fadeUp 0.6s var(--ease) 0.95s forwards; }
    .link-item:nth-child(3) { animation: fadeUp 0.6s var(--ease) 1.05s forwards; }
    .link-item:nth-child(4) { animation: fadeUp 0.6s var(--ease) 1.15s forwards; }
    .link-item:nth-child(5) { animation: fadeUp 0.6s var(--ease) 1.25s forwards; }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 0.95rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-family: var(--ff-mono);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      transition: border-color 0.3s ease, background 0.3s ease, transform 0.25s var(--ease);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,169,110,0.07), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .link-btn:hover {
      border-color: rgba(201,169,110,0.35);
      background: #161618;
      transform: translateY(-2px) translateX(2px);
    }

    .link-btn:hover::before {
      opacity: 1;
    }

    .link-btn:active {
      transform: translateY(0) translateX(0) scale(0.98);
    }

    /* Shine effect on hover */
    .link-btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      transition: left 0.5s ease;
    }

    .link-btn:hover::after {
      left: 140%;
    }

    .link-icon {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
      transition: transform 0.3s var(--ease);
    }

    .link-btn:hover .link-icon {
      transform: scale(1.1) rotate(-4deg);
    }

    .link-icon--kick    { background: rgba(83,185,49,0.15); }
    .link-icon--yt      { background: rgba(255,0,0,0.12); }
    .link-icon--twitch  { background: rgba(145,70,255,0.12); }
    .link-icon--spotify { background: rgba(30,215,96,0.12); }
    .link-icon--twitter { background: rgba(29,161,242,0.12); }
    .link-icon--mail    { background: rgba(201,169,110,0.12); }

    .link-info {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .link-platform {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .link-handle {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .link-arrow {
      margin-left: auto;
      color: var(--gold-dim);
      font-size: 0.9rem;
      transition: transform 0.3s var(--ease), opacity 0.3s ease;
      opacity: 0;
    }

    .link-btn:hover .link-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* ── Footer ───────────────────────────────────── */
    .footer {
      margin-top: 2.4rem;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.6s ease 1.5s forwards;
    }

    .footer__tag {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .footer__tag span {
      color: var(--gold-dim);
    }

    /* ── Toast ────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid rgba(201,169,110,0.3);
      color: var(--text);
      font-family: var(--ff-mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.65rem 1.2rem;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s var(--ease);
      z-index: 99;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Cursor Glow ──────────────────────────────── */
    .cursor-glow {
      position: fixed;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,169,110,0.06), transparent 70%);
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%);
      transition: left 0.12s ease, top 0.12s ease;
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 420px) {
      .card { padding: 2rem 1.4rem; }
      .identity__name { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

  <!-- Background elements -->
  <div class="bg-glow bg-glow--1"></div>

  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- Main card -->

    <div class="divider">

      <span class="divider__dot"></span>
      <span class="divider__line"></span>
    </div>

    <!-- Links -->
    <nav class="links" aria-label="Social links">

      <!-- Kick -->
      <div class="link-item">

          <span class="link-icon link-icon--yt">

            </svg>

      </div>

      <!-- Spotify -->
      <div class="link-item">
        <a class="link-btn" href="https://open.spotify.com/user/316cddgy7avpjwkuicxndin7wwva" target="_blank" rel="noopener">
          <span class="link-icon link-icon--spotify">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z" fill="#1ED760"/>

          <span class="link-info">

      <!-- X / Twitter -->

      <!-- E-posta -->

    <!-- Footer -->

    </footer>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
    /* =============================================
       VANILLA JS — SCSS-structured logic
    ============================================= */

    // ── Cursor glow ───────────────────────────────
    const glow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top  = e.clientY + 'px';
    });

    // ── Toast helper ─────────────────────────────
    const toast    = document.getElementById('toast');
    let   toastTid = null;

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTid);
      toastTid = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    // ── Copy-on-right-click for mail ──────────────
    document.querySelectorAll('.link-btn').forEach(btn => {
      const handle = btn.querySelector('.link-handle');
      if (!handle) return;

      btn.addEventListener('contextmenu', e => {
        const txt = handle.textContent.trim();
        if (txt.includes('@') && txt.includes('.')) {
          e.preventDefault();
          navigator.clipboard.writeText(txt).then(() => {
            showToast('📋  ' + txt + ' kopyalandı');
          });
        }
      });
    });

    // ── Avatar click easter egg ───────────────────
    const avatar = document.getElementById('avatarEl');
    let clicks = 0;
    avatar.addEventListener('click', () => {
      clicks++;
    if (clicks % 5 === 0) showToast('✦  Yusuf Durden gizli mod aktif');
      avatar.animate(
        [{ transform: 'scale(1)' }, { transform: 'scale(1.18) rotate(6deg)' }, { transform: 'scale(1)' }],
        { duration: 350, easing: 'cubic-bezier(0.16,1,0.3,1)' }
      );
    });

    // ── Parallax tilt on card (desktop) ──────────
    const card = document.querySelector('.card');
    let  rafId = null;

    document.addEventListener('mousemove', e => {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(() => {
        const cx = window.innerWidth  / 2;
        const cy = window.innerHeight / 2;
        const rx = ((e.clientY - cy) / cy) * -4;
        const ry = ((e.clientX - cx) / cx) *  4;
        card.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg)`;
      });
    });

    document.addEventListener('mouseleave', () => {
      card.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg)';
    });
  </script>
</body>
</html>
